# Isolated test infrastructure — PostgreSQL on 5433, Redis on 6380
# Usage: docker compose -f docker-compose.test.yml up -d
version: "3.9"

services:
  test-db:
    image: postgres:15.4-alpine
    environment:
      POSTGRES_USER: test_streamr
      POSTGRES_PASSWORD: test_streamr
      POSTGRES_DB: test_streamr
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data  # ephemeral — wiped on stop

  test-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
