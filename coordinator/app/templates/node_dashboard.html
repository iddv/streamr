<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamrP2P — Node Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f6fa; color: #2d3436; padding: 20px; }
        .header { background: linear-gradient(135deg, #00b894, #00cec9); color: #fff; padding: 24px 32px; border-radius: 12px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-size: 1.6em; }
        .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; }
        .dot-ok { background: #55efc4; } .dot-warn { background: #fdcb6e; } .dot-off { background: #d63031; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
        .card .label { font-size: .8em; color: #636e72; text-transform: uppercase; letter-spacing: .5px; }
        .card .value { font-size: 1.8em; font-weight: 700; margin-top: 4px; }
        .trust-high { color: #00b894; } .trust-med { color: #fdcb6e; } .trust-low { color: #d63031; }
        .chart-container { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 24px; }
        .feedback-form { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
        .feedback-form h3 { margin-bottom: 12px; }
        .feedback-form textarea { width: 100%; min-height: 80px; padding: 10px; border: 1px solid #dfe6e9; border-radius: 8px; font-family: inherit; resize: vertical; }
        .feedback-form select, .feedback-form button { margin-top: 10px; padding: 8px 16px; border-radius: 8px; border: 1px solid #dfe6e9; font-family: inherit; }
        .feedback-form button { background: #00b894; color: #fff; border: none; cursor: pointer; font-weight: 600; }
        .feedback-form button:hover { background: #00a381; }
        .feedback-msg { margin-top: 8px; font-size: .85em; }
        .refresh-note { text-align: center; color: #b2bec3; font-size: .8em; margin-top: 16px; }
        #error-banner { display: none; background: #ffeaa7; color: #2d3436; padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="error-banner"></div>
    <div class="header">
        <div>
            <h1 id="node-title">Loading…</h1>
            <span id="conn-status"><span class="status-dot dot-off"></span>Connecting…</span>
        </div>
    </div>

    <div class="cards">
        <div class="card"><div class="label">Balance</div><div class="value" id="balance">—</div></div>
        <div class="card"><div class="label">Bandwidth Today</div><div class="value" id="bw-today">—</div></div>
        <div class="card"><div class="label">Trust Score</div><div class="value" id="trust-score">—</div></div>
        <div class="card"><div class="label">30-Day Earnings</div><div class="value" id="earnings-30d">—</div></div>
    </div>

    <div class="chart-container">
        <h3>7-Day Earnings</h3>
        <canvas id="earnings-chart" height="200" role="img" aria-label="Bar chart showing earnings over the past 7 days"></canvas>
    </div>

    <div class="feedback-form">
        <h3>Send Feedback</h3>
        <textarea id="fb-text" placeholder="Share your experience, report a bug, or suggest an improvement…" aria-label="Feedback text"></textarea>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            <select id="fb-category" aria-label="Feedback category">
                <option value="">Category (optional)</option>
                <option value="bug">Bug</option>
                <option value="suggestion">Suggestion</option>
                <option value="praise">Praise</option>
            </select>
            <button id="fb-submit">Submit Feedback</button>
        </div>
        <div class="feedback-msg" id="fb-msg"></div>
    </div>

    <p class="refresh-note">Auto-refreshes every 10 seconds</p>

    <script>
        const nodeId = window.location.pathname.split('/').pop();
        let earningsChart = null;

        function trustClass(score) {
            if (score >= 0.7) return 'trust-high';
            if (score >= 0.4) return 'trust-med';
            return 'trust-low';
        }

        async function fetchData() {
            const banner = document.getElementById('error-banner');
            try {
                const [econRes, earningsRes] = await Promise.all([
                    fetch(`/api/v1/economics/node/${nodeId}`),
                    fetch(`/api/v1/economics/node/${nodeId}/earnings?days=7`),
                ]);

                if (!econRes.ok) { throw new Error('Node not found'); }
                const econ = await econRes.json();
                const earnings = await earningsRes.json();
                banner.style.display = 'none';

                document.getElementById('node-title').textContent = `Node: ${nodeId.substring(0, 16)}…`;
                const dot = document.querySelector('.status-dot');
                const trust = parseFloat(econ.trust_score);
                dot.className = 'status-dot ' + (trust >= 0.5 ? 'dot-ok' : trust >= 0.3 ? 'dot-warn' : 'dot-off');
                document.getElementById('conn-status').innerHTML = dot.outerHTML + (trust >= 0.3 ? 'Connected' : 'Flagged');

                document.getElementById('balance').textContent = '$' + parseFloat(econ.balance_usd).toFixed(2);
                document.getElementById('bw-today').textContent = parseFloat(econ.gb_relayed).toFixed(2) + ' GB';
                const ts = document.getElementById('trust-score');
                ts.textContent = trust.toFixed(2);
                ts.className = 'value ' + trustClass(trust);
                document.getElementById('earnings-30d').textContent = '$' + parseFloat(econ.earnings_last_30d).toFixed(2);

                // Build chart from earnings entries (aggregate by day)
                const dayMap = {};
                (earnings.entries || []).forEach(e => {
                    const day = e.timestamp.substring(0, 10);
                    dayMap[day] = (dayMap[day] || 0) + parseFloat(e.earnings_usd);
                });
                const labels = Object.keys(dayMap).sort();
                const data = labels.map(d => dayMap[d]);

                if (earningsChart) earningsChart.destroy();
                earningsChart = new Chart(document.getElementById('earnings-chart'), {
                    type: 'bar',
                    data: {
                        labels: labels.map(d => d.substring(5)),
                        datasets: [{ label: 'Earnings (USD)', data, backgroundColor: '#00b894', borderRadius: 6 }]
                    },
                    options: { responsive: true, scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
                });
            } catch (err) {
                banner.textContent = 'Failed to load data: ' + err.message;
                banner.style.display = 'block';
            }
        }

        document.getElementById('fb-submit').addEventListener('click', async () => {
            const text = document.getElementById('fb-text').value.trim();
            const category = document.getElementById('fb-category').value || null;
            const msg = document.getElementById('fb-msg');
            if (!text) { msg.textContent = 'Please enter some feedback.'; msg.style.color = '#d63031'; return; }
            try {
                const res = await fetch('/api/v1/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, category, node_id: nodeId }),
                });
                if (res.ok) {
                    msg.textContent = 'Thanks for your feedback!';
                    msg.style.color = '#00b894';
                    document.getElementById('fb-text').value = '';
                } else {
                    msg.textContent = 'Failed to submit. Try again.';
                    msg.style.color = '#d63031';
                }
            } catch (err) {
                msg.textContent = 'Network error: ' + err.message;
                msg.style.color = '#d63031';
            }
        });

        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
