<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamrP2P — Streamer Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f6fa; color: #2d3436; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 24px 32px; border-radius: 12px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-size: 1.6em; }
        .badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: .85em; font-weight: 600; }
        .badge-live { background: #00b894; }
        .badge-offline { background: #636e72; }
        .badge-ready { background: #0984e3; }
        .badge-testing { background: #fdcb6e; color: #2d3436; }
        .key-box { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,.15); padding: 6px 14px; border-radius: 8px; font-family: monospace; font-size: .85em; }
        .key-box button { background: none; border: none; color: #fff; cursor: pointer; font-size: 1em; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
        .card .label { font-size: .8em; color: #636e72; text-transform: uppercase; letter-spacing: .5px; }
        .card .value { font-size: 1.8em; font-weight: 700; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
        th, td { text-align: left; padding: 12px 16px; }
        th { background: #dfe6e9; font-size: .8em; text-transform: uppercase; letter-spacing: .5px; }
        tr:nth-child(even) { background: #f8f9fa; }
        .trust-high { color: #00b894; } .trust-med { color: #fdcb6e; } .trust-low { color: #d63031; }
        .refresh-note { text-align: center; color: #b2bec3; font-size: .8em; margin-top: 16px; }
        #error-banner { display: none; background: #ffeaa7; color: #2d3436; padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div id="error-banner"></div>
    <div class="header">
        <div>
            <h1 id="stream-title">Loading…</h1>
            <span class="badge" id="status-badge">—</span>
        </div>
        <div class="key-box">
            <span id="stream-key-display">••••••••</span>
            <button id="toggle-key" title="Show/hide stream key" aria-label="Toggle stream key visibility">👁</button>
            <button id="copy-key" title="Copy stream key" aria-label="Copy stream key to clipboard">📋</button>
        </div>
    </div>

    <div class="cards">
        <div class="card"><div class="label">Active Nodes</div><div class="value" id="node-count">—</div></div>
        <div class="card"><div class="label">Bandwidth Saved</div><div class="value" id="bw-saved">—</div></div>
        <div class="card"><div class="label">Est. Cost Savings</div><div class="value" id="cost-savings">—</div></div>
        <div class="card"><div class="label">Total GB Delivered</div><div class="value" id="gb-delivered">—</div></div>
    </div>

    <table>
        <thead><tr><th>Node ID</th><th>Status</th><th>Trust Score</th><th>Capacity</th><th>Viewers</th></tr></thead>
        <tbody id="node-tbody"><tr><td colspan="5">Loading…</td></tr></tbody>
    </table>

    <p class="refresh-note">Auto-refreshes every 10 seconds</p>

    <script>
        const streamId = window.location.pathname.split('/').pop();
        let streamKey = '';
        let keyVisible = false;

        function trustClass(score) {
            if (score >= 0.7) return 'trust-high';
            if (score >= 0.4) return 'trust-med';
            return 'trust-low';
        }

        function badgeClass(status) {
            const s = (status || '').toUpperCase();
            if (s === 'LIVE') return 'badge-live';
            if (s === 'OFFLINE') return 'badge-offline';
            if (s === 'TESTING') return 'badge-testing';
            return 'badge-ready';
        }

        async function fetchData() {
            const banner = document.getElementById('error-banner');
            try {
                const [streamRes, peersRes] = await Promise.all([
                    fetch(`/streams?status=ALL`),
                    fetch(`/api/v1/streams/${streamId}/peers`),
                ]);
                const streams = await streamRes.json();
                const peers = await peersRes.json();

                const stream = streams.find(s => s.stream_id === streamId);
                if (!stream) { banner.textContent = 'Stream not found'; banner.style.display = 'block'; return; }
                banner.style.display = 'none';

                document.getElementById('stream-title').textContent = `Stream: ${stream.stream_id}`;
                const badge = document.getElementById('status-badge');
                badge.textContent = stream.status;
                badge.className = 'badge ' + badgeClass(stream.status);

                streamKey = stream.stream_key || '';
                document.getElementById('stream-key-display').textContent = keyVisible ? streamKey : '••••••••';

                document.getElementById('node-count').textContent = peers.length;
                const totalGB = parseFloat(stream.total_gb_delivered || 0);
                document.getElementById('gb-delivered').textContent = totalGB.toFixed(2) + ' GB';
                const savings = parseFloat(stream.total_cost_usd || 0);
                document.getElementById('cost-savings').textContent = '$' + savings.toFixed(2);
                document.getElementById('bw-saved').textContent = (totalGB * 1024).toFixed(0) + ' MB';

                const tbody = document.getElementById('node-tbody');
                if (peers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">No active nodes</td></tr>';
                } else {
                    tbody.innerHTML = peers.map(n => `<tr>
                        <td>${n.node_id.substring(0, 12)}…</td>
                        <td>active</td>
                        <td class="${trustClass(n.trust_score)}">${(n.trust_score || 0).toFixed(2)}</td>
                        <td>${n.capacity_pct || 0}%</td>
                        <td>${n.viewer_count || 0}</td>
                    </tr>`).join('');
                }
            } catch (err) {
                banner.textContent = 'Failed to load data: ' + err.message;
                banner.style.display = 'block';
            }
        }

        document.getElementById('toggle-key').addEventListener('click', () => {
            keyVisible = !keyVisible;
            document.getElementById('stream-key-display').textContent = keyVisible ? streamKey : '••••••••';
        });
        document.getElementById('copy-key').addEventListener('click', () => {
            navigator.clipboard.writeText(streamKey).then(() => {
                document.getElementById('copy-key').textContent = '✓';
                setTimeout(() => document.getElementById('copy-key').textContent = '📋', 1500);
            });
        });

        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
