# StreamrP2P custom SRS configuration
# Task 7.22 — Req 26.4, Design §28
#
# Mounted into the SRS container via docker-compose volume.
# See: https://ossrs.io/lts/en-us/docs/v5/doc/getting-started

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;
srs_log_level       warn;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

stats {
    network         0;
}

vhost __defaultVhost__ {
    # HLS output for viewer consumption
    hls {
        enabled         on;
        hls_fragment    2;
        hls_window      10;
        hls_path        ./objs/nginx/html;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
        hls_cleanup     on;
        hls_dispose     30;
    }

    # HTTP-FLV for low-latency fallback
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    # Callback to coordinator for stream auth
    http_hooks {
        enabled         on;
        on_publish      http://coordinator:8000/api/v1/srs/on-publish;
        on_unpublish    http://coordinator:8000/api/v1/srs/on-publish;
    }

    # TCP optimization for live streaming
    tcp_nodelay     on;
    min_latency     on;

    play {
        gop_cache       off;
        queue_length    10;
        mw_latency      100;
    }

    publish {
        mr              off;
    }
}
